<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 性能监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

/* ── 默认（深色）主题 ── */
:root {
  --bg: #000000;
  --card: #0a0a0a;
  --card-hover: #111111;
  --border: #222222;
  --border-hover: #333333;
  --text: #ededed;
  --text-dim: #a1a1aa;
  --text-muted: #71717a;
  --accent: #ffffff;
  --grid-line: rgba(255,255,255,0.06);
  --grid-axis: #444444;
  --tooltip-bg: #0a0a0a;
  --radius: 8px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
}

/* ── 浅色主题 (跟随系统) ── */
@media (prefers-color-scheme: light) {
  :root {
    --bg: #ffffff;
    --card: #fafafa;
    --card-hover: #f4f4f5;
    --border: #e4e4e7;
    --border-hover: #d4d4d8;
    --text: #18181b;
    --text-dim: #52525b;
    --text-muted: #71717a;
    --accent: #18181b;
    --grid-line: rgba(0,0,0,0.06);
    --grid-axis: #d4d4d8;
    --tooltip-bg: #ffffff;
  }
}

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }

.header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 24px 32px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.02em; }
.header h1 span { font-weight: 600; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 24px; }
.status-badge { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); font-weight: 500; }
.status-badge.running { color: var(--text); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
.status-badge.running .status-dot { animation: pulse 2s infinite; background: var(--accent); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.3; } }
.meta-info { font-size: 13px; color: var(--text-muted); display: flex; gap: 16px; }
.meta-info span { color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; }

.github-link { color: var(--text-muted); display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); transition: all .2s; }
.github-link:hover { color: var(--accent); border-color: var(--accent); }

.refresh-control { display: flex; align-items: center; gap: 8px; }
.refresh-countdown { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); min-width: 32px; text-align: right; }
.refresh-btn { background: var(--card); color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; }
.refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
.refresh-btn.spinning svg { animation: spin .6s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.container { max-width: 1440px; margin: 0 auto; padding: 32px; }

.cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; min-width: 0; }
.notice-banner { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 24px; font-size: 13px; color: var(--text-dim); }
.model-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; transition: all .2s ease; min-width: 0; }
.model-card:hover { border-color: var(--border-hover); background: var(--card-hover); }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.card-title { font-size: 15px; font-weight: 500; font-family: var(--font-mono); }
.card-time { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
.metric-box { display: flex; flex-direction: column; }
.metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
.metric-value { font-size: 24px; font-weight: 500; font-family: var(--font-mono); letter-spacing: -0.02em; color: var(--text); }
.metric-unit { font-size: 13px; color: var(--text-muted); font-weight: 400; margin-left: 4px; }
.metric-sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-family: var(--font-mono); }

.section-title { font-size: 15px; font-weight: 500; margin-bottom: 20px; color: var(--text); }

.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; min-width: 0; }
.chart-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
.chart-card-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.chart-card h3 { font-size: 13px; font-weight: 500; color: var(--text-dim); }
.chart-toggles { display: flex; gap: 12px; }
.chart-toggle { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); cursor: pointer; user-select: none; transition: color .2s; }
.chart-toggle:hover { color: var(--text-dim); }
.chart-toggle input { width: 13px; height: 13px; accent-color: var(--accent); cursor: pointer; margin: 0; }
.chart-toggle .dash-mark { display: inline-block; width: 14px; border-top: 1.5px dashed currentColor; }
.chart-toggle .solid-mark { display: inline-block; width: 14px; border-top: 1.5px solid currentColor; }
.chart-container { position: relative; height: 260px; width: 100%; min-width: 0; flex-grow: 1; }

.chart-legend { display: grid; grid-auto-flow: row; gap: 6px 16px; justify-content: center; align-items: center; margin-bottom: 14px; }
.legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); cursor: pointer; user-select: none; transition: opacity .2s; }
.legend-item:hover { opacity: 0.8; }
.legend-item.hidden { opacity: 0.3; }
.legend-item.hidden .legend-label { text-decoration: line-through; }
.legend-line { width: 20px; height: 0; flex-shrink: 0; border-top: 2px solid; }
.legend-line.dashed { border-top-style: dashed; }

.stats-section { margin-bottom: 32px; }
.stats-model-label { margin-bottom: 12px; font-size: 13px; font-weight: 500; font-family: var(--font-mono); display: flex; align-items: center; gap: 8px; }
.stats-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.stats-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }
.stat-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
.stat-value { font-size: 18px; font-weight: 500; font-family: var(--font-mono); color: var(--text); }
.stat-range { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-family: var(--font-mono); }

.table-section { margin-bottom: 32px; }
.table-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.tab-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid transparent; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 13px; font-weight: 500; transition: all .2s ease; font-family: var(--font-sans); }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { background: var(--card); border-color: var(--border); color: var(--text); }

.table-responsive { width: 100%; border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
table { width: 100%; border-collapse: collapse; text-align: left; background: var(--card); table-layout: auto; word-break: break-word; }
thead th { background: rgba(255,255,255,0.02); padding: 14px 16px; font-size: 12px; font-weight: 500; color: var(--text-muted); border-bottom: 1px solid var(--border); }
tbody td { padding: 14px 16px; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-dim); font-family: var(--font-mono); }
tbody tr { transition: background .2s ease; }
tbody tr:hover { background: rgba(255,255,255,0.02); }
tbody tr:last-child td { border-bottom: none; }
.no-data { text-align: center; padding: 48px; color: var(--text-muted); font-family: var(--font-sans); }

/* ── 分页控件 ── */
.pagination { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
.pagination-info { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
.pagination-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.page-btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--font-sans); transition: all .2s ease; min-width: 32px; }
.page-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border-hover); }
.page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.page-jump { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 6px 8px; font-size: 13px; font-family: var(--font-mono); width: 64px; text-align: center; outline: none; }
.page-jump:focus { border-color: var(--accent); }
.page-jump::-webkit-outer-spin-button, .page-jump::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.page-jump { -moz-appearance: textfield; }

@media (max-width: 1024px) {
  .cards-row, .charts-grid { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(3, 1fr); }
  .container { padding: 24px; }
  .header { padding: 20px 24px; }
}
@media (max-width: 640px) {
  .metrics-grid { gap: 12px; }
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .header { padding: 16px; flex-direction: column; gap: 16px; align-items: flex-start; }
  .header-right { flex-direction: column; align-items: flex-start; gap: 12px; }
  .meta-info { flex-direction: column; gap: 4px; }
  .container { padding: 16px; }
  .cards-row, .charts-grid { gap: 16px; margin-bottom: 24px; }
  .model-card, .chart-card, .stat-item { padding: 16px; }
  .metric-value { font-size: 20px; }
  .chart-container { height: 220px; }
  /* 表格自适应缩小，不截断不滑动 */
  table { font-size: 10px; width: 100%; table-layout: auto; }
  thead th, tbody td { padding: 8px 4px; font-size: 10px; white-space: normal; word-break: break-all; }
  .table-responsive { overflow-x: visible; }
}
</style>
</head>
<body>

<div class="header">
  <h1>API 性能监控</h1>
  <div class="header-right">
    <div class="status-badge" id="statusBadge">
      <div class="status-dot"></div>
      <span id="statusText">等待连接...</span>
    </div>
    <div class="meta-info">
      <div>上次测试: <span id="lastRun">—</span></div>
      <div>下次测试: <span id="nextRun">—</span></div>
      <div>累计测试: <span id="totalCycles">—</span></div>
    </div>
    <div class="refresh-control">
      <span class="refresh-countdown" id="refreshCountdown">下次刷新 30s</span>
      <button class="refresh-btn" id="refreshBtn" title="立即刷新">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
    <a class="github-link" href="https://github.com/Lianues/ds-benchmark" target="_blank" rel="noopener" title="GitHub 仓库">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.4 3-.405 1.02.005 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
    </a>
  </div>
</div>

<div class="container">

  <div class="notice-banner">思考模式 · 测试服务器使用美国服务器，国内用户酌情参考</div>

  <!-- Model Cards (动态生成) -->
  <div class="cards-row" id="cardsRow"></div>

  <!-- Charts -->
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
    <h2 style="font-size:16px; font-weight:600;">📈 性能趋势</h2>
    <div class="table-controls" id="chartRangeBar">
      <button class="tab-btn" data-hours="1">1h</button>
      <button class="tab-btn" data-hours="3">3h</button>
      <button class="tab-btn" data-hours="6">6h</button>
      <button class="tab-btn" data-hours="24">24h</button>
      <button class="tab-btn" data-hours="48">2天</button>
      <button class="tab-btn active" data-hours="72">3天</button>
      <button class="tab-btn" data-hours="168">7天</button>
      <button class="tab-btn" data-hours="0">全部</button>
    </div>
  </div>
  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-card-header"><h3>整体 TPS (tokens/s) 趋势</h3><div class="chart-toggles"><label class="chart-toggle" title="显示/隐藏所有实线（数据）"><input type="checkbox" data-toggle="data" checked><span class="solid-mark"></span>数据</label><label class="chart-toggle" title="显示/隐藏所有趋势线"><input type="checkbox" data-toggle="trend" checked><span class="dash-mark"></span>趋势</label></div></div>

      <div class="chart-legend" id="legend-chartOverall"></div>
      <div class="chart-container"><canvas id="chartOverall"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><h3>首字时间 (ms) 趋势</h3><div class="chart-toggles"><label class="chart-toggle" title="显示/隐藏所有实线（数据）"><input type="checkbox" data-toggle="data" checked><span class="solid-mark"></span>数据</label><label class="chart-toggle" title="显示/隐藏所有趋势线"><input type="checkbox" data-toggle="trend" checked><span class="dash-mark"></span>趋势</label></div></div>

      <div class="chart-legend" id="legend-chartTTFT"></div>
      <div class="chart-container"><canvas id="chartTTFT"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><h3>内容 TPS (tokens/s) 趋势</h3><div class="chart-toggles"><label class="chart-toggle" title="显示/隐藏所有实线（数据）"><input type="checkbox" data-toggle="data" checked><span class="solid-mark"></span>数据</label><label class="chart-toggle" title="显示/隐藏所有趋势线"><input type="checkbox" data-toggle="trend" checked><span class="dash-mark"></span>趋势</label></div></div>

      <div class="chart-legend" id="legend-chartTPS"></div>
      <div class="chart-container"><canvas id="chartTPS"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><h3>思维链 TPS (tokens/s) 趋势</h3><div class="chart-toggles"><label class="chart-toggle" title="显示/隐藏所有实线（数据）"><input type="checkbox" data-toggle="data" checked><span class="solid-mark"></span>数据</label><label class="chart-toggle" title="显示/隐藏所有趋势线"><input type="checkbox" data-toggle="trend" checked><span class="dash-mark"></span>趋势</label></div></div>

      <div class="chart-legend" id="legend-chartReasoning"></div>
      <div class="chart-container"><canvas id="chartReasoning"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><h3>请求成功率 (%) 趋势</h3><div class="chart-toggles"><label class="chart-toggle" title="显示/隐藏所有实线（数据）"><input type="checkbox" data-toggle="data" checked><span class="solid-mark"></span>数据</label><label class="chart-toggle" title="显示/隐藏所有趋势线"><input type="checkbox" data-toggle="trend" checked><span class="dash-mark"></span>趋势</label></div></div>

      <div class="chart-legend" id="legend-chartSuccess"></div>
      <div class="chart-container"><canvas id="chartSuccess"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><h3>内容 Token 趋势</h3><div class="chart-toggles"><label class="chart-toggle" title="显示/隐藏所有实线（数据）"><input type="checkbox" data-toggle="data" checked><span class="solid-mark"></span>数据</label><label class="chart-toggle" title="显示/隐藏所有趋势线"><input type="checkbox" data-toggle="trend" checked><span class="dash-mark"></span>趋势</label></div></div>

      <div class="chart-legend" id="legend-chartContentTokens"></div>
      <div class="chart-container"><canvas id="chartContentTokens"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-card-header"><h3>思考 Token 趋势</h3><div class="chart-toggles"><label class="chart-toggle" title="显示/隐藏所有实线（数据）"><input type="checkbox" data-toggle="data" checked><span class="solid-mark"></span>数据</label><label class="chart-toggle" title="显示/隐藏所有趋势线"><input type="checkbox" data-toggle="trend" checked><span class="dash-mark"></span>趋势</label></div></div>

      <div class="chart-legend" id="legend-chartReasoningTokens"></div>
      <div class="chart-container"><canvas id="chartReasoningTokens"></canvas></div>
    </div>
  </div>

  <!-- 24h Stats (动态生成) -->
  <div class="stats-section">
    <div class="section-title">过去 24 小时统计</div>
    <div id="statsContainer"></div>
  </div>

  <!-- History Table -->
  <div class="table-section">
    <div class="section-title">历史记录</div>
    <div class="table-controls" id="historyFilters"></div>
    <div class="table-responsive">
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>模型</th>
            <th>首字时间</th>
            <th>内容TPS</th>
            <th>整体TPS</th>
            <th>思维链TPS</th>
            <th>思考时间</th>
            <th>Completion</th>
            <th>成功率</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="9" class="no-data">加载中...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="historyPagination">
      <div class="pagination-info" id="paginationInfo">—</div>
      <div class="pagination-controls">
        <button class="page-btn" id="pageFirst" title="首页">«</button>
        <button class="page-btn" id="pagePrev" title="上一页">‹ 上一页</button>
        <input class="page-jump" id="pageJump" type="number" min="1" value="1" title="跳转到指定页" />
        <button class="page-btn" id="pageNext" title="下一页">下一页 ›</button>
        <button class="page-btn" id="pageLast" title="末页">»</button>
      </div>
    </div>
  </div>

</div>

<script>
// ─── 模型配置（唯一需要修改的地方）──────────────────
const MODELS = [
  { key: 'deepseek-v4-pro',   prefix: 'pro',   color: '#60a5fa', bg: 'rgba(96,165,250,0.12)',  label: 'V4 Pro' },
  { key: 'deepseek-v4-flash', prefix: 'flash', color: '#fb923c', bg: 'rgba(251,146,60,0.12)',  label: 'V4 Flash' },
  { key: 'glm-5.1',           prefix: 'glm',   color: '#a78bfa', bg: 'rgba(167,139,250,0.12)', label: 'GLM-5.1' },
  { key: 'kimi-k2.6',         prefix: 'kimi',  color: '#34d399', bg: 'rgba(52,211,153,0.12)',   label: 'Kimi K2.6' },
];
const MODEL_COLOR = Object.fromEntries(MODELS.map(m => [m.key, m.color]));

// ─── 常量 ─────────────────────────────────────
const REFRESH_INTERVAL = 30_000;
const CHART_HOURS_KEY = 'ds-bench:chartHours';
const VALID_HOURS = [0, 1, 3, 6, 24, 48, 72, 168];
function loadChartHours() {
  const v = parseInt(localStorage.getItem(CHART_HOURS_KEY));
  return VALID_HOURS.includes(v) ? v : 72;
}
let chartHours = loadChartHours();
let charts = {};

// ─── DOM 生成 ─────────────────────────────────

function metricBox(label, valueId, subId) {
  return `<div class="metric-box">
    <div class="metric-label">${label}</div>

// ─── 主题 & 图表工具 ──────────────────────────

// 自定义 HTML 图例插件：分两行显示（实线 / 趋势线）
const htmlLegendPlugin = {
  id: 'htmlLegend',
  afterUpdate(chart) {
    const legendEl = document.getElementById('legend-' + chart.canvas.id);
    if (!legendEl) return;

    const n = MODELS.length;

    function renderItem(dsIndex) {
      const ds = chart.data.datasets[dsIndex];
      if (!ds) return '';
      const hidden = !chart.isDatasetVisible(dsIndex);
      const isTrend = ds.borderDash && ds.borderDash.length > 0;
      return `<span class="legend-item${hidden ? ' hidden' : ''}" data-idx="${dsIndex}">
        <span class="legend-line${isTrend ? ' dashed' : ''}" style="border-color:${ds.borderColor}"></span>
        <span class="legend-label">${ds.label}</span>
      </span>`;
    }

    // 用 N 列 Grid，2 行：第 1 行实线 (数据)，第 2 行虚线 (趋势)
    // grid-auto-flow: row 会按顺序填充 → item[i] 与 item[n+i] 自动对齐到同一列
    legendEl.style.gridTemplateColumns = `repeat(${n}, auto)`;
    const row1 = Array.from({length: n}, (_, i) => renderItem(i)).join('');
    const row2 = Array.from({length: n}, (_, i) => renderItem(n + i)).join('');
    legendEl.innerHTML = row1 + row2;

    // 点击切换 dataset 可见性
    legendEl.querySelectorAll('.legend-item').forEach(el => {
      el.onclick = () => {
        const idx = parseInt(el.dataset.idx);
        chart.setDatasetVisibility(idx, !chart.isDatasetVisible(idx));
        chart.update();
      };
    });

    // 同步图表卡片右上角的"数据 / 趋势"复选框状态
    const card = chart.canvas.closest('.chart-card');
    if (card) {
      const dataCb  = card.querySelector('input[data-toggle="data"]');
      const trendCb = card.querySelector('input[data-toggle="trend"]');
      syncGroupCheckbox(chart, dataCb,  0, n);
      syncGroupCheckbox(chart, trendCb, n, n);
    }
  }
};
Chart.register(htmlLegendPlugin);

// 同步一组 dataset 的可见性状态到复选框：全开=checked，全关=unchecked，部分=indeterminate
function syncGroupCheckbox(chart, checkbox, startIdx, count) {
  if (!checkbox) return;
  let visibleCount = 0;
  for (let i = startIdx; i < startIdx + count; i++) {
    if (chart.isDatasetVisible(i)) visibleCount++;
  }
  if (visibleCount === count) {
    checkbox.checked = true;
    checkbox.indeterminate = false;
  } else if (visibleCount === 0) {
    checkbox.checked = false;
    checkbox.indeterminate = false;
  } else {
    checkbox.checked = false;
    checkbox.indeterminate = true;
  }
}

// 一组 dataset (实线 / 趋势) 整体显示或隐藏
function setGroupVisibility(chart, startIdx, count, visible) {
  for (let i = startIdx; i < startIdx + count; i++) {
    chart.setDatasetVisibility(i, visible);
  }
  chart.update();
}

// 给某个图表卡片绑定 toggle 事件
function setupChartToggles(canvasId, chart) {
  const card = document.getElementById(canvasId).closest('.chart-card');
  if (!card) return;
  const n = MODELS.length;
  card.querySelector('input[data-toggle="data"]') ?.addEventListener('change', e => setGroupVisibility(chart, 0, n, e.target.checked));
  card.querySelector('input[data-toggle="trend"]')?.addEventListener('change', e => setGroupVisibility(chart, n, n, e.target.checked));
}

function createChart(id, cfg) {
  return new Chart(document.getElementById(id).getContext('2d'), cfg);
}

function themeColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    text: s.getPropertyValue('--text').trim(),
    dim:  s.getPropertyValue('--text-dim').trim(),
    muted: s.getPropertyValue('--text-muted').trim(),
    grid: s.getPropertyValue('--grid-line').trim(),
    tooltipBg: s.getPropertyValue('--tooltip-bg').trim(),
    border: s.getPropertyValue('--border').trim(),
  };
}

function baseChartConfig(yLabel, datasets) {
  const c = themeColors();
  return {
    type: 'line',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: c.tooltipBg, titleColor: c.text, bodyColor: c.text,
          borderColor: c.border, borderWidth: 1, padding: 12,
          displayColors: true, usePointStyle: true, boxWidth: 8, boxHeight: 8,
          bodyFont: { family: 'JetBrains Mono, monospace' },
          callbacks: {
            title: (items) => items.length ? fmtTimeFull(items[0].label) : '',
            labelColor: function(context) {
              const ds = context.dataset;
              const isTrend = ds.borderDash && ds.borderDash.length > 0;
              const tooltipBg = getComputedStyle(document.documentElement).getPropertyValue('--tooltip-bg').trim();
              return {
                borderColor: ds.borderColor,
                backgroundColor: isTrend ? tooltipBg : ds.borderColor,
                borderWidth: isTrend ? 2 : 0,
              };
            }
          }
        }
      },
      scales: {
        x: {
          type: 'category',
          ticks: {
            color: c.muted, font: { family: 'JetBrains Mono, monospace', size: 10 },
            maxRotation: 45, maxTicksLimit: 15,
            callback: function(val) { return fmtTimeShort(this.getLabelForValue(val)); }
          },
          grid: { color: c.grid }
        },
        y: { title: { display: true, text: yLabel, color: c.muted, font: { family: 'Inter, sans-serif', size: 11 } }, ticks: { color: c.muted, font: { family: 'JetBrains Mono, monospace', size: 11 } }, grid: { color: c.grid }, beginAtZero: false }
      },
      elements: { point: { radius: 0, hoverRadius: 4 }, line: { tension: 0.3, borderWidth: 1.5 } }
    }
  };
}

// 为单个模型生成数据线 dataset
function makeDataset(m) {
  return { label: m.key, data: [], borderColor: m.color, backgroundColor: m.bg, pointBackgroundColor: m.color, pointBorderColor: m.color, fill: false };
}

// 为单个模型生成趋势线 dataset (虚线)
function makeTrendDataset(m) {
  return {
    label: m.label + ' · 趋势', data: [],
    borderColor: m.color, backgroundColor: 'transparent',
    borderDash: [6, 4], borderWidth: 1.5,
    pointStyle: 'circle', pointBackgroundColor: 'transparent',
    pointBorderColor: m.color, pointBorderWidth: 1.5,
    pointRadius: 0, pointHoverRadius: 0,
    fill: false, tension: 0.4, spanGaps: true,
  };
}

// 生成全部 datasets: [model0, model1, ..., trend0, trend1, ...]
function allDatasets() {
  return [...MODELS.map(makeDataset), ...MODELS.map(makeTrendDataset)];
}

// 简单移动平均 (SMA)
function movingAverage(values, window) {
  if (!values || values.length === 0) return [];
  const w = Math.max(1, window | 0);
  const out = [];
  for (let i = 0; i < values.length; i++) {
    const start = Math.max(0, i - w + 1);
    let sum = 0, cnt = 0;
    for (let j = start; j <= i; j++) {
      const v = values[j];
      if (v != null && !isNaN(v)) { sum += v; cnt++; }
    }
    out.push(cnt > 0 ? sum / cnt : null);
  }
  return out;
}

function chooseWindow(n) {
  if (n < 4) return 1;
  return Math.max(3, Math.min(15, Math.round(n / 6)));
}

// 更新图表：接受 labels + 每个模型的数据数组
function applyChartData(chart, labels, modelsData) {
  const w = chooseWindow(labels.length);
  const n = MODELS.length;
  chart.data.labels = labels;
  for (let i = 0; i < n; i++) {
    chart.data.datasets[i].data = modelsData[i] || [];
    chart.data.datasets[n + i].data = movingAverage(modelsData[i] || [], w);
  }
  chart.update('none');
}

function initCharts() {
  charts.tps      = createChart('chartTPS',      baseChartConfig('tokens/s', allDatasets()));
  charts.ttft     = createChart('chartTTFT',     baseChartConfig('ms',       allDatasets()));
  charts.overall  = createChart('chartOverall',  baseChartConfig('tokens/s', allDatasets()));
  charts.reasoning = createChart('chartReasoning', baseChartConfig('tokens/s', allDatasets()));

  // 成功率图：y 轴固定 0-100%
  const successCfg = baseChartConfig('%', allDatasets());
  successCfg.options.scales.y.beginAtZero = true;
  successCfg.options.scales.y.suggestedMin = 0;
  successCfg.options.scales.y.suggestedMax = 100;
  successCfg.options.scales.y.ticks.callback = (v) => v + '%';
  successCfg.options.elements = {
    point: {
      radius: (ctx) => (ctx.raw != null && ctx.raw < 100) ? 4 : 0,
      hoverRadius: 5,
    },
    line: { tension: 0.3, borderWidth: 1.5 },
  };
  charts.success = createChart('chartSuccess', successCfg);

  charts.contentTokens   = createChart('chartContentTokens',   baseChartConfig('tokens', allDatasets()));
  charts.reasoningTokens = createChart('chartReasoningTokens', baseChartConfig('tokens', allDatasets()));

  // 给所有图表的右上角 toggle 复选框绑定事件
  Object.entries({
    chartTPS: charts.tps, chartTTFT: charts.ttft, chartOverall: charts.overall,
    chartReasoning: charts.reasoning, chartSuccess: charts.success,
    chartContentTokens: charts.contentTokens, chartReasoningTokens: charts.reasoningTokens,
  }).forEach(([id, chart]) => setupChartToggles(id, chart));
}

// ─── Helpers ─────────────────────────────────

async function fetchJSON(url) {
  try { const r = await fetch(url); const d = await r.json(); return d.success ? d.data : null; }
  catch { return null; }
}

function fmtTime(iso) {
  if (!iso) return '—';
  let d;
  const s = String(iso);
  if (s.includes('T') || /[Z]$/i.test(s) || /[+-]\d{2}:?\d{2}$/.test(s)) {
    d = new Date(s);
  } else {
    d = new Date(s.replace(' ', 'T') + 'Z');
  }
  return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function parseTs(iso) {
  if (!iso) return null;
  const s = String(iso);
  let d;
  if (s.includes('T') || /Z$/i.test(s) || /[+-]\d{2}:?\d{2}$/.test(s)) {
    d = new Date(s);
  } else {
    d = new Date(s.replace(' ', 'T') + 'Z');
  }
  return isNaN(d.getTime()) ? null : d;
}

function fmtTimeShort(iso) {
  const d = parseTs(iso);
  if (!d) return '—';
  return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function fmtTimeFull(iso) {
  const d = parseTs(iso);
  if (!d) return '—';
  return d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function fmtMs(ms) {
  if (ms == null || ms === 0) return '—';
  return ms < 1000 ? ms.toFixed(0) + ' ms' : (ms / 1000).toFixed(1) + ' s';
}

function fmtTps(v) {
  if (v == null || v === 0) return '—';
  return v.toFixed(1);
}

function fmtRate(sc, tc) {
  if (tc == null || tc === 0) return { html: '—', sub: '' };
  const pct = sc / tc * 100;
  let color = 'var(--text)';
  if (pct < 100) color = '#fb923c';
  if (pct < 60)  color = '#ef4444';
  return {
    html: `<span style="color:${color}">${pct.toFixed(0)}<span class="metric-unit">%</span></span>`,
    sub: `${sc} / ${tc} 成功`
  };
}

// ─── Update Charts ───────────────────────────

async function updateCharts() {
  const data = await fetchJSON(`/api/chart-data?hours=${chartHours}`);
  if (!data) return;

  // 合并所有模型的时间戳为统一的 x 轴
  const tsSet = new Set();
  MODELS.forEach(m => {
    const md = data[m.key] || {};
    (md.timestamps || []).forEach(t => tsSet.add(t));
  });
  const labels = [...tsSet].sort();

  // 将模型数据映射到统一时间轴
  function mapData(modelKey, field) {
    const md = data[modelKey] || {};
    const times = md.timestamps || [];
    const values = md[field] || [];
    return labels.map(l => { const i = times.indexOf(l); return i >= 0 ? values[i] : null; });
  }
  function modelsField(field) {
    return MODELS.map(m => mapData(m.key, field));
  }

  applyChartData(charts.tps,             labels, modelsField('content_tps'));
  applyChartData(charts.ttft,            labels, modelsField('ttft_ms'));
  applyChartData(charts.overall,         labels, modelsField('overall_tps'));
  applyChartData(charts.reasoning,       labels, modelsField('reasoning_tps'));
  applyChartData(charts.success,         labels, modelsField('success_rate'));
  applyChartData(charts.contentTokens,   labels, modelsField('output_tokens'));
  applyChartData(charts.reasoningTokens, labels, modelsField('reasoning_tokens'));
}

// ─── History Table ───────────────────────────

let currentFilter = 'all';
const PAGE_SIZE = 50;
let currentPage = 1;
let totalPages = 1;
let totalCount = 0;

async function updateHistory() {
  const offset = (currentPage - 1) * PAGE_SIZE;
  const param = currentFilter === 'all' ? '' : `model=${currentFilter}&`;
  const data = await fetchJSON(`/api/batches?${param}limit=${PAGE_SIZE}&offset=${offset}`);
  const tbody = document.getElementById('historyBody');

  if (!data) {
    tbody.innerHTML = '<tr><td colspan="9" class="no-data">加载失败</td></tr>';
    totalCount = 0; totalPages = 1;
    renderPagination();
    return;
  }

  const items = data.items || [];
  totalCount = data.total || 0;
  totalPages = Math.max(1, Math.ceil(totalCount / PAGE_SIZE));

  if (currentPage > totalPages) {
    currentPage = totalPages;
    return updateHistory();
  }

  if (items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="no-data">暂无数据</td></tr>';
    renderPagination();
    return;
  }

  tbody.innerHTML = items.map(b => {
    const color = MODEL_COLOR[b.model] || 'var(--text-dim)';
    return `<tr>
      <td>${fmtTime(b.timestamp)}</td>
      <td><span style="color:${color}">${b.model}</span></td>
      <td>${fmtMs(b.avg_ttft_ms)}</td>
      <td>${fmtTps(b.avg_content_tps)} t/s</td>
      <td>${fmtTps(b.avg_overall_tps)} t/s</td>
      <td>${fmtTps(b.avg_reasoning_tps)} t/s</td>
      <td>${fmtMs(b.avg_thinking_duration_ms)}</td>
      <td>${Math.round(b.avg_completion_tokens || 0)}</td>
      <td>${b.success_count}/${b.total_count}</td>
    </tr>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const info = document.getElementById('paginationInfo');
  const first = document.getElementById('pageFirst');
  const prev = document.getElementById('pagePrev');
  const next = document.getElementById('pageNext');
  const last = document.getElementById('pageLast');
  const jump = document.getElementById('pageJump');

  if (totalCount === 0) {
    info.textContent = '共 0 条';
  } else {
    const start = (currentPage - 1) * PAGE_SIZE + 1;
    const end = Math.min(currentPage * PAGE_SIZE, totalCount);
    info.textContent = `共 ${totalCount} 条 · 显示 ${start}-${end} · 第 ${currentPage} / ${totalPages} 页`;
  }

  first.disabled = currentPage <= 1;
  prev.disabled = currentPage <= 1;
  next.disabled = currentPage >= totalPages;
  last.disabled = currentPage >= totalPages;

  jump.max = totalPages;
  if (document.activeElement !== jump) jump.value = currentPage;
}

function gotoPage(page) {
  const p = Math.max(1, Math.min(totalPages, parseInt(page) || 1));
  if (p === currentPage) {
    document.getElementById('pageJump').value = currentPage;
    return;
  }
  currentPage = p;
  updateHistory();
}

// 分页按钮事件
document.getElementById('pageFirst').addEventListener('click', () => gotoPage(1));
document.getElementById('pagePrev').addEventListener('click', () => gotoPage(currentPage - 1));
document.getElementById('pageNext').addEventListener('click', () => gotoPage(currentPage + 1));
document.getElementById('pageLast').addEventListener('click', () => gotoPage(totalPages));
document.getElementById('pageJump').addEventListener('change', (e) => gotoPage(e.target.value));
document.getElementById('pageJump').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); gotoPage(e.target.value); e.target.blur(); }
});

// 图表时间范围切换
document.querySelectorAll('#chartRangeBar .tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    chartHours = parseInt(btn.dataset.hours);
    try { localStorage.setItem(CHART_HOURS_KEY, String(chartHours)); } catch (_) {}
    document.querySelectorAll('#chartRangeBar .tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    updateCharts();
  });
});

// ─── Init & Refresh ──────────────────────────

async function refreshAll() {
  await Promise.all([updateStatus(), updateCards(), updateCharts(), updateStats(), updateHistory()]);
}

window.addEventListener('DOMContentLoaded', () => {
  // 生成动态 DOM
  generateCards();
  generateStats();
  generateHistoryFilters();

  // 图表时间范围按钮高亮
  document.querySelectorAll('#chartRangeBar .tab-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.hours) === chartHours);
  });

  initCharts();
  refreshAll();
  setupAutoRefresh();
  setupFastStatusPolling();
  setupThemeListener();
});

// ─── 自动刷新 + 倒计时 + 手动按钮 ──────────────

let countdownSecs = REFRESH_INTERVAL / 1000;
let countdownTimer = null;
let refreshTimer = null;

function setupAutoRefresh() {
  const countdownEl = document.getElementById('refreshCountdown');
  const btn = document.getElementById('refreshBtn');

  function tick() {
    countdownSecs -= 1;
    if (countdownSecs <= 0) {
      countdownEl.textContent = '刷新中...';
    } else {
      countdownEl.textContent = `下次刷新 ${countdownSecs}s`;
    }
  }

  function scheduleNext() {
    countdownSecs = REFRESH_INTERVAL / 1000;
    countdownEl.textContent = `下次刷新 ${countdownSecs}s`;
    clearInterval(countdownTimer);
    countdownTimer = setInterval(tick, 1000);
  }

  async function doRefresh() {
    btn.classList.add('spinning');
    countdownEl.textContent = '刷新中...';
    await refreshAll();
    btn.classList.remove('spinning');
    scheduleNext();
  }

  refreshTimer = setInterval(doRefresh, REFRESH_INTERVAL);
  btn.addEventListener('click', () => {
    clearInterval(refreshTimer);
    doRefresh().then(() => {
      refreshTimer = setInterval(doRefresh, REFRESH_INTERVAL);
    });
  });

  scheduleNext();
}

// ─── 状态快速轮询（每 2s）──
function setupFastStatusPolling() {
  setInterval(updateStatus, 2000);
}

// ─── 系统主题切换监听 ──
function setupThemeListener() {
  if (!window.matchMedia) return;
  const mq = window.matchMedia('(prefers-color-scheme: light)');
  mq.addEventListener('change', () => {
    Object.values(charts).forEach(c => c.destroy());
    charts = {};
    initCharts();
    updateCharts();
  });
}
</script>
